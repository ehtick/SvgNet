name: .NET Core

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.2
    
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.203    

    - shell: bash
      run: dotnet build --configuration Release -v:m
